padding: 10px 20px;

}

.stat-sub {

}
/* Filter bar */

border: 1px solid #374151;

align-items: center;
gap: 15px;

.filter-group {

align-items: center;

}
.filter-label {

.filter-select {

color: #e5e7eb;
}

display: flex;

gap: 5px;

.btn-primary {

}
.btn-outline {
background: #252a33;
color: #e5e7eb;

/* Table */

border: 1px solid #374151;

.badge-real {

<body>
<div class="container">
<div class="header">
<div style="margin:auto;">
<p class="jmktoptitle">John Mark Karr</p>
<p class="jmksubtitle">Projects</p>
</div>
</div>
<!-- Main content area -->
<div class="content">
<!-- Page header -->
<div class="page-header">
</div>
<!-- Stats widgets -->
<div class="stats-grid" id="statsGrid">
<div class="stat-widget">
<div class="stat-title">Total Projects</div>
<div class="stat-value" id="totalProjects">8</div>
<div class="stat-sub">Active stats pages</div>
</div>
<div class="stat-widget">
<div class="stat-title">Last Updated</div>
<div class="stat-value" id="lastUpdated">-</div>
<div class="stat-sub">Today</div>
</div>
<div class="stat-widget">
<div class="stat-title">Categories</div>
<div class="stat-value" id="categories">4</div>
<div class="stat-sub">Project types</div>
</div>
<div class="stat-widget">
<div class="stat-title">Top Project</div>
<div class="stat-value" id="topProject">-</div>
<div class="stat-sub" id="topProjectSub">Most visited</div>
</div>
</div>
<!-- Filter bar -->
<div class="filter-bar">
<div class="filter-group">
<span class="filter-label">VIEW</span>
<label class="filter-checkbox">
<input type="checkbox" id="showAll" checked> Show all projects
</label>
</div>
<div class="filter-group">
<select id="categoryFilter" class="filter-select">
<option value="">All categories</option>
<option value="main">Main</option>
</select>
<select id="sortSelect" class="filter-select">
<option value="name">Sort by name</option>
<option value="recent">Most recent</option>
</select>
</div>
<div style="margin-left: auto; display: flex; gap: 8px;">
<button id="refreshBtn" class="btn btn-primary">🔄 Refresh</button>
</div>
</div>
<!-- Projects grid container -->
<div class="table-container">
<div class="table-header">
<div class="table-title">
Statistics Projects
<span id="projectCount" style="color: #6f8fae; margin-left: 10px; font-weight: normal;">8 projects</span>
</div>
<div class="table-controls">
<button id="exportBtn" class="btn btn-outline" style="font-size: 11px;">📋 Export List</button>
</div>
</div>
<div style="overflow-x: auto;">
<div id="projectsContainer" class="projects-grid">
<!-- Projects will be inserted here -->
</div>
</div>
</div>
</div>
</div>

<script>
// API URL - same as your stats page (CHANGED to JMK reader)
const API_URL = 'https://autumn-mode-0a5a.jmk-e2d.workers.dev';

// Project list with their pageId values (matching what you put in snippets)
// CHANGED: All projects should be your JMK projects
const projects = [
{ name: "John Mark Karr", pageId: "p1001", url: "/stats/p1001", category: "main" },
{ name: "Official Statements", pageId: "p1002", url: "/stats/p1002", category: "main" },
{ name: "JonBenet Ramsey", pageId: "p1003", url: "/stats/p1003", category: "main" },
{ name: "The Cult", pageId: "p1004", url: "/stats/p1004", category: "main" },
{ name: "Polly Hannah Klaas", pageId: "p1005", url: "/stats/p1005", category: "main" },
{ name: "2001 Investigation", pageId: "p1006", url: "/stats/p1006", category: "main" }
];

let visitorData = [];

async function loadVisitData() {
    try {
        // Fetch last 24 hours of data
        const url = `${API_URL}?limit=1000`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.ok && Array.isArray(data.rows)) {
            visitorData = data.rows;
            console.log('All pageIds in data:', [...new Set(visitorData.map(row => row.pageId))]);
            console.log('Total rows:', visitorData.length);
            console.log('Sample row:', visitorData[0]);
        }
    } catch (error) {
        console.error('Failed to load visit data:', error);
    }
    renderProjects();
}

function getLast24HoursCount(pageId) {
    if (!visitorData.length) return '0';

    // Get EST midnight for today
    const now = new Date();
    const estNow = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
    const estMidnight = new Date(estNow);
    estMidnight.setHours(0, 0, 0, 0);

    const midnightTimestamp = estMidnight.getTime();

    const count = visitorData.filter(row => {
        if (row.pageId !== pageId) return false;
        // Convert the database timestamp to EST for comparison
        const estRowDate = new Date(new Date(row.ts).toLocaleString("en-US", { timeZone: "America/New_York" }));
        return estRowDate.getTime() >= midnightTimestamp;
    }).length;

    return count;
}

function getTotalCount(pageId) {
    if (!visitorData.length) return '0';
    const count = visitorData.filter(row => row.pageId === pageId).length;
    return count;
}

function renderProjects() {
    const container = document.getElementById('projectsContainer');
    const categoryFilter = document.getElementById('categoryFilter')?.value || '';
    
    let filteredProjects = projects;
    if (categoryFilter) {
        filteredProjects = filteredProjects.filter(p => p.category === categoryFilter);
    }
    
    let html = '';
    filteredProjects.forEach(project => {
        const last24h = getLast24HoursCount(project.pageId);
        const total = getTotalCount(project.pageId);
        
     html += `
     <div class="project-card">
     <div class="project-name">${project.name}</div>
     <div style="display: flex; gap: 8px; font-size: 14px;margin-bottom:-5px;">
     <div><span style="color: #9ca3af;">24h:</span> <span style="color: #60a5fa;">${last24h}</span></div>
     <div><span style="color: #9ca3af;">Total:</span> <span style="color: #60a5fa;">${total}</span></div>
     </div>
     <a href="${project.url}" class="project-link" target="_blank">View Statistics →</a></div>
        `;
    });
    
    container.innerHTML = html || '<div style="padding: 20px; text-align: center; color: #9ca3af;">No projects found</div>';
    document.getElementById('projectCount').innerText = `${filteredProjects.length} projects`;
    
    // Update stats widgets
    document.getElementById('totalProjects').innerText = projects.length;
    document.getElementById('lastUpdated').innerText = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    document.getElementById('categories').innerText = [...new Set(projects.map(p => p.category))].length;
    
    // Find project with most visits in last 24h
    let topProject = '—';
    let topCount = 0;
    projects.forEach(p => {
        const count = getLast24HoursCount(p.pageId);
        if (count > topCount) {
            topCount = count;
            topProject = p.name;
        }
    });
    
    document.getElementById('topProject').innerText = topProject;
    document.getElementById('topProjectSub').innerText = topCount ? `${topCount} visits (24h)` : 'Most visited';
}

// Single event listener
document.addEventListener('DOMContentLoaded', () => {
    loadVisitData();
    document.getElementById('refreshBtn').addEventListener('click', loadVisitData);
    document.getElementById('categoryFilter')?.addEventListener('change', renderProjects);
    document.getElementById('exportBtn')?.addEventListener('click', () => {
        alert('Export feature coming soon');
    });
});
</script>

</body>
